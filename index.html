<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>💪 다이어트 트래커</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #f8f9fa; min-height: 100vh; }
    input, button, select, textarea { font-family: inherit; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { createElement as h, useState, useEffect, useRef } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';

const UNITS = ['개','회','분','초'];
const EMOJIS = ['🏃','💪','🦵','⬆️','🪜','🏋️','🤸','🚴','🧘','🤼','🥊','🏊','⚽','🎽','🔥','🧗','🤾','🏇'];

const DEFAULT_EXERCISES = [
  { id:'squat',   label:'스쿼트',       emoji:'🦵', target:100, unit:'개' },
  { id:'pushup',  label:'팔굽혀펴기',   emoji:'💪', target:60,  unit:'개' },
  { id:'hangbar', label:'철봉 매달리기', emoji:'🏋️', target:2,   unit:'분' },
  { id:'pullup',  label:'턱걸이',       emoji:'⬆️', target:10,  unit:'개' },
  { id:'stairs',  label:'계단오르기',   emoji:'🪜', target:2,   unit:'회' },
];

const KEY = 'fit-tracker-v2';
const today = () => new Date().toISOString().slice(0,10);
const fmtDate = s => { const [,m,d]=s.split('-'); return `${+m}/${+d}`; };
const fmtTime = () => { const n=new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; };
const uid = () => Math.random().toString(36).slice(2,8);

function loadData() {
  try {
    const r = localStorage.getItem(KEY);
    if (!r) return null;
    const d = JSON.parse(r);
    if (!d.exercises) d.exercises = DEFAULT_EXERCISES;
    if (!d.logs) d.logs = {};
    if (!d.weights) d.weights = [];
    if (!d.targetLog) d.targetLog = [];
    return d;
  } catch { return null; }
}
const saveData = d => { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch {} };
const emptyData = () => ({ weights:[], logs:{}, exercises: DEFAULT_EXERCISES, targetLog:[] });

// ── Modals ──
function Overlay({ onClick, children }) {
  return h('div', { onClick, style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:100,display:'flex',alignItems:'flex-end',justifyContent:'center'} }, children);
}
function Sheet({ onClick, children }) {
  return h(Overlay, { onClick },
    h('div', { onClick:e=>e.stopPropagation(), style:{background:'white',borderRadius:'20px 20px 0 0',padding:24,width:'100%',maxWidth:430,maxHeight:'90vh',overflowY:'auto'} }, children)
  );
}
function CenterModal({ onClick, children }) {
  return h('div', { onClick, style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:20} },
    h('div', { onClick:e=>e.stopPropagation(), style:{background:'white',borderRadius:20,padding:24,width:'100%',maxWidth:360,maxHeight:'90vh',overflowY:'auto'} }, children)
  );
}
function Btn({ onClick, disabled, color='#667eea', outline, children, style={} }) {
  const bg = outline ? 'white' : (disabled ? '#eee' : `linear-gradient(135deg,${color},${color==='#667eea'?'#764ba2':color})`);
  const clr = outline ? (disabled?'#ccc':'#667eea') : (disabled?'#bbb':'white');
  return h('button', { onClick, disabled, style:{padding:'11px 0',borderRadius:10,border:outline?`1.5px solid ${disabled?'#ddd':'#667eea'}`:'none',background:bg,color:clr,fontWeight:700,fontSize:14,cursor:disabled?'not-allowed':'pointer',width:'100%',...style} }, children);
}

function App() {
  const [data, setData] = useState(() => loadData() || emptyData());
  const [tab, setTab] = useState('today');
  const [logModal, setLogModal] = useState(null);   // exercise id
  const [logInput, setLogInput] = useState('');
  const [addModal, setAddModal] = useState(false);
  const [editModal, setEditModal] = useState(null); // exercise object
  const [wInput, setWInput] = useState('');
  const [toast, setToast] = useState(null);
  const toastRef = useRef(null);

  // new exercise form
  const [newLabel, setNewLabel] = useState('');
  const [newEmoji, setNewEmoji] = useState('🏃');
  const [newTarget, setNewTarget] = useState('');
  const [newUnit, setNewUnit] = useState('개');

  useEffect(() => { saveData(data); }, [data]);

  const showToast = (msg, type='ok') => {
    setToast({msg,type});
    clearTimeout(toastRef.current);
    toastRef.current = setTimeout(()=>setToast(null), 2200);
  };

  const tod = today();
  const exercises = data.exercises;
  const todLogs = data.logs[tod] || {};
  const todWeight = data.weights.find(w=>w.date===tod);
  const startW = data.weights.length ? data.weights[0].weight : 86;
  const latestW = data.weights.length ? data.weights[data.weights.length-1].weight : null;
  const lost = latestW ? (startW-latestW).toFixed(1) : 0;

  const getDone = (id, logsObj) => ((logsObj||todLogs)[id]||[]).reduce((s,e)=>s+e.amount,0);

  // weight
  const submitW = () => {
    const w=parseFloat(wInput);
    if (isNaN(w)||w<30||w>200) return;
    setData(p=>({...p, weights:[...p.weights.filter(x=>x.date!==tod),{date:tod,weight:w}].sort((a,b)=>a.date.localeCompare(b.date))}));
    setWInput(''); showToast('✅ 몸무게 저장됨!');
  };

  // log exercise
  const submitLog = () => {
    const amt=parseFloat(logInput);
    if (!logModal||isNaN(amt)||amt<=0) return;
    const id=logModal;
    setData(p=>{
      const pl=p.logs||{},pd=pl[tod]||{},pe=pd[id]||[];
      return {...p,logs:{...pl,[tod]:{...pd,[id]:[...pe,{amount:amt,time:fmtTime()}]}}};
    });
    setLogInput(''); setLogModal(null);
    showToast(`+${amt} 기록됨 💪`);
  };

  const undoLast = id => {
    setData(p=>{
      const pl=p.logs||{},pd=pl[tod]||{},pe=[...(pd[id]||[])];
      if(!pe.length) return p;
      pe.pop();
      return {...p,logs:{...pl,[tod]:{...pd,[id]:pe}}};
    });
  };

  // add exercise
  const resetNewForm = () => { setNewLabel(''); setNewEmoji('🏃'); setNewTarget(''); setNewUnit('개'); };
  const submitAdd = () => {
    const t=parseFloat(newTarget);
    if (!newLabel.trim()||isNaN(t)||t<=0) return;
    const ex={id:uid(),label:newLabel.trim(),emoji:newEmoji,target:t,unit:newUnit};
    setData(p=>({...p,exercises:[...p.exercises,ex]}));
    resetNewForm(); setAddModal(false);
    showToast(`✅ ${ex.label} 추가됨!`);
  };

  // edit exercise (target increase only, or label/emoji)
  const [editLabel, setEditLabel] = useState('');
  const [editEmoji, setEditEmoji] = useState('');
  const [editTarget, setEditTarget] = useState('');
  const [editUnit, setEditUnit] = useState('개');
  const openEdit = ex => {
    setEditModal(ex);
    setEditLabel(ex.label);
    setEditEmoji(ex.emoji);
    setEditTarget(String(ex.target));
    setEditUnit(ex.unit);
  };
  const submitEdit = () => {
    if (!editModal) return;
    const t=parseFloat(editTarget);
    if (!editLabel.trim()||isNaN(t)||t<=0) return;
    if (t < editModal.target) { showToast('목표는 줄일 수 없어요','err'); return; }
    const updated={...editModal,label:editLabel.trim(),emoji:editEmoji,target:t,unit:editUnit};
    if (t > editModal.target) {
      setData(p=>({...p,
        exercises:p.exercises.map(e=>e.id===editModal.id?updated:e),
        targetLog:[...(p.targetLog||[]),{date:tod,id:editModal.id,label:editModal.label,from:editModal.target,to:t,unit:editUnit}]
      }));
    } else {
      setData(p=>({...p,exercises:p.exercises.map(e=>e.id===editModal.id?updated:e)}));
    }
    setEditModal(null);
    showToast('✅ 수정됨!');
  };
  const deleteExercise = id => {
    setData(p=>({...p,exercises:p.exercises.filter(e=>e.id!==id)}));
    setEditModal(null);
    showToast('삭제됨');
  };

  const completedCount = exercises.filter(ex=>getDone(ex.id)>=ex.target).length;

  // chart
  const cw=data.weights.slice(-14);
  const minW2=cw.length?Math.min(...cw.map(w=>w.weight))-0.5:83;
  const maxW2=cw.length?Math.max(...cw.map(w=>w.weight))+0.5:87;
  const rng=maxW2-minW2||1, CH=130, CW=300;
  const toY=w=>CH-((w-minW2)/rng)*CH;
  const toX=i=>cw.length<2?CW/2:(i/(cw.length-1))*CW;
  const pts=cw.map((w,i)=>`${toX(i)},${toY(w.weight)}`).join(' ');

  // stat dates
  const statDates = Object.keys(data.logs).sort().slice(-14);

  const EmojiPicker = ({value,onChange}) => h('div',{style:{display:'flex',flexWrap:'wrap',gap:6,marginBottom:4}},
    ...EMOJIS.map(e=>h('button',{key:e,onClick:()=>onChange(e),style:{fontSize:22,padding:'4px 6px',borderRadius:8,border:`2px solid ${value===e?'#667eea':'transparent'}`,background:value===e?'#f0f0ff':'white',cursor:'pointer'}},e))
  );

  return h('div',{style:{maxWidth:430,margin:'0 auto',background:'#f8f9fa',minHeight:'100vh',paddingBottom:40}},

    // Toast
    toast&&h('div',{style:{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',zIndex:300,background:toast.type==='err'?'#f44336':'#1a1a2e',color:'white',borderRadius:14,padding:'13px 22px',fontSize:13,fontWeight:600,boxShadow:'0 4px 20px rgba(0,0,0,0.3)',maxWidth:320,textAlign:'center'}},toast.msg),

    // ── Log Modal ──
    logModal&&(()=>{
      const ex=exercises.find(e=>e.id===logModal);
      if(!ex) return null;
      const done=getDone(logModal);
      const val=parseFloat(logInput),ok=!isNaN(val)&&val>0;
      const entries=todLogs[logModal]||[];
      return h(Sheet,{onClick:()=>setLogModal(null)},
        h('div',{style:{fontSize:16,fontWeight:700,marginBottom:2}},`${ex.emoji} ${ex.label}`),
        h('div',{style:{fontSize:13,color:'#999',marginBottom:12}},
          '오늘: ',h('b',{style:{color:'#667eea'}},done),`/${ex.target}${ex.unit}`,
          done<ex.target&&` · 남은 ${ex.target-done}${ex.unit}`
        ),
        entries.length>0&&h('div',{style:{background:'#f8f9fa',borderRadius:10,padding:'10px 12px',marginBottom:12}},
          ...entries.map((e,i)=>h('div',{key:i,style:{display:'flex',justifyContent:'space-between',fontSize:13,padding:'3px 0',color:'#555'}},
            h('span',{style:{color:'#aaa'}},e.time),h('span',null,`+${e.amount}${ex.unit}`)
          )),
          h('div',{style:{borderTop:'1px solid #eee',marginTop:6,paddingTop:6,display:'flex',justifyContent:'space-between',fontWeight:700,fontSize:13}},
            h('span',{style:{color:'#aaa'}},'합계'),h('span',{style:{color:'#667eea'}},`${done}${ex.unit}`)
          )
        ),
        h('div',{style:{display:'flex',gap:8,marginBottom:8}},
          h('input',{type:'number',autoFocus:true,min:1,placeholder:`몇 ${ex.unit}?`,value:logInput,
            onChange:e=>setLogInput(e.target.value),
            onKeyDown:e=>e.key==='Enter'&&ok&&submitLog(),
            style:{flex:1,padding:'12px 14px',borderRadius:10,border:`1.5px solid ${ok?'#667eea':'#ddd'}`,fontSize:16,outline:'none'}}),
          h('button',{onClick:submitLog,disabled:!ok,style:{padding:'12px 20px',borderRadius:10,border:'none',background:ok?'linear-gradient(135deg,#667eea,#764ba2)':'#eee',color:ok?'white':'#bbb',fontWeight:700,fontSize:15,cursor:ok?'pointer':'not-allowed'}},'추가')
        ),
        h('div',{style:{display:'flex',gap:8}},
          entries.length>0&&h('button',{onClick:()=>{undoLast(logModal);setLogModal(null);},style:{flex:1,padding:'10px 0',borderRadius:10,border:'1.5px solid #eee',background:'white',color:'#f44336',fontSize:13,cursor:'pointer',fontWeight:600}},'↩ 마지막 취소'),
          h('button',{onClick:()=>setLogModal(null),style:{flex:1,padding:'10px 0',borderRadius:10,border:'1.5px solid #eee',background:'white',color:'#999',fontSize:13,cursor:'pointer'}},'닫기')
        )
      );
    })(),

    // ── Add Exercise Modal ──
    addModal&&h(Sheet,{onClick:()=>{setAddModal(false);resetNewForm();}},
      h('div',{style:{fontSize:16,fontWeight:700,marginBottom:16}},'➕ 운동 추가'),
      h('div',{style:{fontSize:13,color:'#888',marginBottom:8}},'이모지 선택'),
      h(EmojiPicker,{value:newEmoji,onChange:setNewEmoji}),
      h('input',{value:newLabel,onChange:e=>setNewLabel(e.target.value),placeholder:'운동 이름',
        style:{width:'100%',padding:'11px 14px',borderRadius:10,border:'1.5px solid #ddd',fontSize:15,outline:'none',marginBottom:10,marginTop:10}}),
      h('div',{style:{display:'flex',gap:8,marginBottom:16}},
        h('input',{type:'number',min:1,value:newTarget,onChange:e=>setNewTarget(e.target.value),placeholder:'목표',
          style:{flex:1,padding:'11px 14px',borderRadius:10,border:'1.5px solid #ddd',fontSize:15,outline:'none'}}),
        h('select',{value:newUnit,onChange:e=>setNewUnit(e.target.value),
          style:{padding:'11px 14px',borderRadius:10,border:'1.5px solid #ddd',fontSize:15,outline:'none',background:'white',cursor:'pointer'}},
          ...UNITS.map(u=>h('option',{key:u,value:u},u))
        )
      ),
      h('div',{style:{display:'flex',gap:8}},
        h('button',{onClick:()=>{setAddModal(false);resetNewForm();},style:{flex:1,padding:'12px 0',borderRadius:10,border:'1.5px solid #eee',background:'white',color:'#999',fontSize:14,cursor:'pointer'}},'취소'),
        h('button',{onClick:submitAdd,disabled:!newLabel.trim()||!(parseFloat(newTarget)>0),style:{flex:2,padding:'12px 0',borderRadius:10,border:'none',background:newLabel.trim()&&parseFloat(newTarget)>0?'linear-gradient(135deg,#667eea,#764ba2)':'#eee',color:newLabel.trim()&&parseFloat(newTarget)>0?'white':'#bbb',fontWeight:700,fontSize:14,cursor:'pointer'}},'추가')
      )
    ),

    // ── Edit Exercise Modal ──
    editModal&&h(Sheet,{onClick:()=>setEditModal(null)},
      h('div',{style:{fontSize:16,fontWeight:700,marginBottom:16}},'✏️ 운동 수정'),
      h('div',{style:{fontSize:13,color:'#888',marginBottom:8}},'이모지'),
      h(EmojiPicker,{value:editEmoji,onChange:setEditEmoji}),
      h('input',{value:editLabel,onChange:e=>setEditLabel(e.target.value),placeholder:'운동 이름',
        style:{width:'100%',padding:'11px 14px',borderRadius:10,border:'1.5px solid #ddd',fontSize:15,outline:'none',marginBottom:10,marginTop:10}}),
      h('div',{style:{fontSize:13,color:'#888',marginBottom:6}},'목표 (현재보다 낮게는 못 바꿔요)'),
      h('div',{style:{display:'flex',gap:8,marginBottom:16}},
        h('input',{type:'number',min:editModal.target,value:editTarget,onChange:e=>setEditTarget(e.target.value),
          style:{flex:1,padding:'11px 14px',borderRadius:10,border:'1.5px solid #ddd',fontSize:15,outline:'none'}}),
        h('select',{value:editUnit,onChange:e=>setEditUnit(e.target.value),
          style:{padding:'11px 14px',borderRadius:10,border:'1.5px solid #ddd',fontSize:15,outline:'none',background:'white',cursor:'pointer'}},
          ...UNITS.map(u=>h('option',{key:u,value:u},u))
        )
      ),
      h('div',{style:{display:'flex',gap:8,marginBottom:8}},
        h('button',{onClick:()=>setEditModal(null),style:{flex:1,padding:'12px 0',borderRadius:10,border:'1.5px solid #eee',background:'white',color:'#999',fontSize:14,cursor:'pointer'}},'취소'),
        h('button',{onClick:submitEdit,style:{flex:2,padding:'12px 0',borderRadius:10,border:'none',background:'linear-gradient(135deg,#667eea,#764ba2)',color:'white',fontWeight:700,fontSize:14,cursor:'pointer'}},'저장')
      ),
      h('button',{onClick:()=>deleteExercise(editModal.id),style:{width:'100%',padding:'11px 0',borderRadius:10,border:'1.5px solid #ffcdd2',background:'#fff5f5',color:'#e53935',fontSize:14,cursor:'pointer',fontWeight:600}},'🗑 이 운동 삭제')
    ),

    // ── Header ──
    h('div',{style:{background:'linear-gradient(135deg,#667eea 0%,#764ba2 100%)',padding:'52px 20px 24px',color:'white'}},
      h('div',{style:{fontSize:13,opacity:0.8,marginBottom:8}},'💪 다이어트 트래커'),
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-end'}},
        h('div',null,
          h('div',{style:{fontSize:40,fontWeight:800,lineHeight:1}},latestW??86,h('span',{style:{fontSize:20,fontWeight:600}},'kg')),
          h('div',{style:{fontSize:13,opacity:0.8,marginTop:4}},'현재 몸무게')
        ),
        h('div',{style:{textAlign:'right'}},
          h('div',{style:{fontSize:30,fontWeight:800,lineHeight:1,color:parseFloat(lost)>0?'#a8edbc':'rgba(255,255,255,0.6)'}},parseFloat(lost)>0?`-${lost}`:'0',h('span',{style:{fontSize:16}},'kg')),
          h('div',{style:{fontSize:13,opacity:0.8,marginTop:4}},`시작(${startW}kg) 대비`)
        )
      )
    ),

    // ── Tabs ──
    h('div',{style:{display:'flex',background:'white',borderBottom:'2px solid #eee',position:'sticky',top:0,zIndex:10}},
      ...['today','history'].map(key=>h('button',{key,onClick:()=>setTab(key),style:{flex:1,padding:'14px 0',border:'none',background:'none',cursor:'pointer',fontWeight:tab===key?700:400,color:tab===key?'#667eea':'#999',borderBottom:tab===key?'2px solid #667eea':'2px solid transparent',marginBottom:-2,fontSize:15}},key==='today'?'오늘':'기록'))
    ),

    h('div',{style:{padding:16}},

      // ── 오늘 탭 ──
      tab==='today'&&h('div',null,

        // 몸무게
        h('div',{style:{background:'white',borderRadius:16,padding:16,marginBottom:16,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}},
          h('div',{style:{fontSize:14,fontWeight:600,marginBottom:10,color:'#444'}},'⚖️ 오늘 몸무게'),
          h('div',{style:{display:'flex',gap:8}},
            h('input',{type:'number',step:0.1,min:30,max:200,inputMode:'decimal',
              placeholder:todWeight?`오늘: ${todWeight.weight}kg`:'몸무게 입력 (kg)',
              value:wInput,onChange:e=>setWInput(e.target.value),
              onKeyDown:e=>e.key==='Enter'&&submitW(),
              style:{flex:1,padding:'11px 14px',borderRadius:10,border:'1.5px solid #e0e0e0',fontSize:16,outline:'none'}}),
            h('button',{onClick:submitW,style:{padding:'11px 20px',borderRadius:10,border:'none',background:'linear-gradient(135deg,#667eea,#764ba2)',color:'white',fontWeight:700,cursor:'pointer',fontSize:15}},'기록')
          ),
          todWeight&&h('div',{style:{fontSize:12,color:'#4caf50',marginTop:6}},`✅ 오늘 ${todWeight.weight}kg`)
        ),

        // 운동 목록
        h('div',{style:{background:'white',borderRadius:16,padding:16,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
            h('div',null,
              h('div',{style:{fontSize:14,fontWeight:600,color:'#444'}},'🏃 오늘의 운동'),
              h('div',{style:{fontSize:12,color:completedCount===exercises.length?'#4caf50':'#aaa',marginTop:2}},`${completedCount}/${exercises.length} 완료${completedCount===exercises.length?' 🎉':''}`)
            ),
            h('button',{onClick:()=>setAddModal(true),style:{padding:'8px 14px',borderRadius:10,border:'none',background:'linear-gradient(135deg,#667eea,#764ba2)',color:'white',fontWeight:700,fontSize:13,cursor:'pointer'}},'+ 운동 추가')
          ),

          exercises.length===0&&h('div',{style:{textAlign:'center',color:'#ccc',padding:'32px 0',fontSize:14}},'운동을 추가해보세요!'),

          ...exercises.map(ex=>{
            const done=getDone(ex.id), pct=Math.min(100,(done/ex.target)*100), completed=done>=ex.target;
            const entries=todLogs[ex.id]||[];
            return h('div',{key:ex.id,style:{marginBottom:22}},
              h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:6}},
                h('span',{style:{fontSize:22}},ex.emoji),
                h('span',{style:{fontWeight:700,fontSize:15,color:completed?'#4caf50':'#222',flex:1}},`${ex.label}${completed?' ✅':''}`),
                h('button',{onClick:()=>openEdit(ex),style:{padding:'4px 10px',borderRadius:6,border:'1.5px solid #e8e8e8',background:'white',color:'#aaa',fontSize:12,cursor:'pointer'}},'수정')
              ),
              h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:7}},
                h('div',{style:{flex:1,background:'#f0f0f0',borderRadius:99,height:10,overflow:'hidden'}},
                  h('div',{style:{background:completed?'linear-gradient(90deg,#43e97b,#38f9d7)':'linear-gradient(90deg,#667eea,#764ba2)',borderRadius:99,height:'100%',width:`${pct}%`,transition:'width 0.35s'}})
                ),
                h('span',{style:{fontSize:13,fontWeight:700,color:completed?'#4caf50':'#667eea',minWidth:72,textAlign:'right'}},`${done}/${ex.target}${ex.unit}`)
              ),
              entries.length>0&&h('div',{style:{display:'flex',flexWrap:'wrap',gap:5,marginBottom:7}},
                ...entries.map((e,i)=>h('span',{key:i,style:{background:'#ede7f6',color:'#5c35b5',borderRadius:20,padding:'4px 11px',fontSize:12,fontWeight:600}},
                  `+${e.amount}${ex.unit}`,h('span',{style:{color:'#b39ddb',fontWeight:400,fontSize:11}},` ${e.time}`)
                ))
              ),
              h('button',{onClick:()=>{setLogModal(ex.id);setLogInput('');},style:{width:'100%',padding:'10px 0',borderRadius:10,border:completed?'1.5px solid #c8f0d4':'1.5px dashed #c5cae9',background:completed?'#f0fdf4':'#f5f6ff',color:completed?'#43a047':'#667eea',fontWeight:600,fontSize:13,cursor:'pointer'}},
                completed?'✓ 완료 · 더 추가하기':'+ 기록 추가'
              )
            );
          })
        )
      ),

      // ── 기록 탭 ──
      tab==='history'&&h('div',null,

        // 몸무게 차트
        h('div',{style:{background:'white',borderRadius:16,padding:16,marginBottom:16,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}},
          h('div',{style:{fontSize:14,fontWeight:600,color:'#444',marginBottom:14}},'📉 몸무게 변화'),
          cw.length<2
            ?h('div',{style:{textAlign:'center',color:'#ccc',padding:'32px 0',fontSize:13}},'몸무게를 2일 이상 기록하면 그래프가 나타나요')
            :h('svg',{viewBox:`-14 -14 ${CW+28} ${CH+36}`,width:'100%',style:{overflow:'visible'}},
              h('defs',null,h('linearGradient',{id:'wg',x1:'0',y1:'0',x2:'1',y2:'0'},h('stop',{offset:'0%',stopColor:'#667eea'}),h('stop',{offset:'100%',stopColor:'#764ba2'}))),
              h('polyline',{fill:'none',stroke:'url(#wg)',strokeWidth:3,strokeLinejoin:'round',strokeLinecap:'round',points:pts}),
              ...cw.map((w,i)=>h('g',{key:i},
                h('circle',{cx:toX(i),cy:toY(w.weight),r:5,fill:'#764ba2',stroke:'white',strokeWidth:2}),
                h('text',{x:toX(i),y:toY(w.weight)-10,textAnchor:'middle',fontSize:10,fill:'#555',fontWeight:600},w.weight),
                (i===0||i===cw.length-1||cw.length<=7)&&h('text',{x:toX(i),y:CH+22,textAnchor:'middle',fontSize:9,fill:'#bbb'},fmtDate(w.date))
              ))
            )
        ),

        // 운동 통계
        h('div',{style:{background:'white',borderRadius:16,padding:16,marginBottom:16,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}},
          h('div',{style:{fontSize:14,fontWeight:600,color:'#444',marginBottom:4}},'🏅 운동 통계'),
          h('div',{style:{fontSize:12,color:'#bbb',marginBottom:14}},'최근 14일'),
          statDates.length===0
            ?h('div',{style:{textAlign:'center',color:'#ccc',padding:'24px 0',fontSize:13}},'운동 기록이 없어요')
            :exercises.map(ex=>{
              const dayTotals=statDates.map(date=>{
                const dl=data.logs[date]||{};
                return {date,total:getDone(ex.id,dl)};
              }).filter(d=>d.total>0);
              if(!dayTotals.length) return null;
              const totalAmt=dayTotals.reduce((s,d)=>s+d.total,0);
              const avgAmt=(totalAmt/dayTotals.length).toFixed(1);
              const maxAmt=Math.max(...dayTotals.map(d=>d.total));
              const completeDays=dayTotals.filter(d=>d.total>=ex.target).length;
              const barDays=dayTotals.slice(-7);
              const barMax=Math.max(...barDays.map(d=>d.total),ex.target);
              return h('div',{key:ex.id,style:{paddingBottom:18,marginBottom:18,borderBottom:'1px solid #f5f5f5'}},
                h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:10}},
                  h('span',{style:{fontSize:20}},ex.emoji),
                  h('div',{style:{flex:1}},
                    h('div',{style:{fontSize:14,fontWeight:700,color:'#333'}},ex.label),
                    h('div',{style:{fontSize:11,color:'#aaa'}},`${dayTotals.length}일 기록`)
                  ),
                  h('div',{style:{textAlign:'right'}},
                    h('div',{style:{fontSize:16,fontWeight:800,color:'#667eea'}},`${totalAmt}${ex.unit}`),
                    h('div',{style:{fontSize:11,color:'#aaa'}},'누적')
                  )
                ),
                h('div',{style:{display:'flex',gap:8,marginBottom:12}},
                  ...[{label:'일평균',val:`${avgAmt}${ex.unit}`},{label:'최고',val:`${maxAmt}${ex.unit}`},{label:'목표달성',val:`${completeDays}일`}]
                  .map(({label,val})=>h('div',{key:label,style:{flex:1,background:'#f8f9fa',borderRadius:10,padding:'8px 0',textAlign:'center'}},
                    h('div',{style:{fontSize:14,fontWeight:700,color:'#444'}},val),
                    h('div',{style:{fontSize:10,color:'#bbb',marginTop:2}},label)
                  ))
                ),
                barDays.length>0&&h('div',{style:{display:'flex',alignItems:'flex-end',gap:4,height:48}},
                  ...barDays.map((d,i)=>{
                    const comp=d.total>=ex.target, bh=Math.max(4,(d.total/barMax)*44);
                    return h('div',{key:i,style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}},
                      h('div',{style:{width:'100%',height:bh,borderRadius:4,background:comp?'linear-gradient(180deg,#43e97b,#38f9d7)':'linear-gradient(180deg,#667eea,#764ba2)'}}),
                      h('div',{style:{fontSize:9,color:'#ccc',whiteSpace:'nowrap'}},fmtDate(d.date))
                    );
                  })
                )
              );
            }).filter(Boolean)
        ),

        // 몸무게 목록
        h('div',{style:{background:'white',borderRadius:16,padding:16,marginBottom:16,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}},
          h('div',{style:{fontSize:14,fontWeight:600,color:'#444',marginBottom:12}},'📋 몸무게 기록'),
          data.weights.length===0
            ?h('div',{style:{textAlign:'center',color:'#ccc',padding:'24px 0',fontSize:13}},'아직 기록이 없어요')
            :h('div',null,...[...data.weights].reverse().map((w,i)=>{
              const prev=data.weights[data.weights.length-1-i-1];
              const diff=prev?(w.weight-prev.weight).toFixed(1):null;
              return h('div',{key:w.date,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'11px 0',borderBottom:'1px solid #f5f5f5'}},
                h('div',{style:{color:'#888',fontSize:14}},w.date.slice(5).replace('-','/')),
                h('div',{style:{display:'flex',alignItems:'center',gap:10}},
                  diff!==null&&h('span',{style:{fontSize:12,color:parseFloat(diff)<0?'#4caf50':parseFloat(diff)>0?'#f44336':'#ccc',fontWeight:600}},parseFloat(diff)>0?`+${diff}`:diff,'kg'),
                  h('span',{style:{fontWeight:700,fontSize:17,color:'#222'}},w.weight,'kg')
                )
              );
            }))
        ),

        // 목표 변경 로그
        data.targetLog?.length>0&&h('div',{style:{background:'white',borderRadius:16,padding:16,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}},
          h('div',{style:{fontSize:14,fontWeight:600,color:'#444',marginBottom:12}},'📈 목표 변경 이력'),
          ...[...data.targetLog].reverse().map((log,i)=>{
            const ex=exercises.find(e=>e.id===log.id);
            return h('div',{key:i,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid #f5f5f5'}},
              h('div',{style:{fontSize:14,color:'#333'}},ex?ex.label:log.label||log.id),
              h('div',{style:{display:'flex',alignItems:'center',gap:8,fontSize:13}},
                h('span',{style:{color:'#aaa'}},`${log.from}${log.unit||''}`),
                h('span',{style:{color:'#ddd'}},'→'),
                h('span',{style:{color:'#4caf50',fontWeight:700}},`${log.to}${log.unit||''}`),
                h('span',{style:{color:'#ccc',fontSize:11}},log.date.slice(5).replace('-','/'))
              )
            );
          })
        )
      )
    )
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
