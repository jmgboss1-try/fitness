<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>💪 다이어트 트래커</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #f8f9fa; min-height: 100vh; }
    input, button, select { font-family: inherit; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { createElement as h, useState, useEffect, useRef } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';

const UNITS  = ['개','회','분','초'];
const EMOJIS = ['🏃','💪','🦵','⬆️','🪜','🏋️','🤸','🚴','🧘','🥊','🏊','⚽','🎽','🔥','🧗','🤾','🏇','🦾'];
const DAYS_KO = ['일','월','화','수','목','금','토'];

const DEFAULT_EXERCISES = [
  {id:'squat',   label:'스쿼트',       emoji:'🦵', target:100, unit:'개'},
  {id:'pushup',  label:'팔굽혀펴기',   emoji:'💪', target:60,  unit:'개'},
  {id:'hangbar', label:'철봉 매달리기', emoji:'🏋️', target:2,   unit:'분'},
  {id:'pullup',  label:'턱걸이',       emoji:'⬆️', target:10,  unit:'개'},
  {id:'stairs',  label:'계단오르기',   emoji:'🪜', target:2,   unit:'회'},
];

const KEY = 'fit-tracker-v2';
const localToday = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const fmtDate    = s => { const [,m,d]=s.split('-'); return `${+m}/${+d}`; };
const fmtTime    = () => { const n=new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; };
const uid        = () => Math.random().toString(36).slice(2,8);

const getDoneFromLogs   = (logs,id)  => (logs[id]||[]).reduce((s,e)=>s+e.amount,0);
const isFullRoutine     = (logs,exs) => exs.length>0 && exs.every(ex=>getDoneFromLogs(logs,ex.id)>=ex.target);
const hasAnyLog         = (logs,exs) => exs.some(ex=>getDoneFromLogs(logs,ex.id)>0);
const completedExCount  = (logs,exs) => exs.filter(ex=>getDoneFromLogs(logs,ex.id)>=ex.target).length;

function loadData() {
  try {
    const r=localStorage.getItem(KEY); if(!r) return null;
    const d=JSON.parse(r);
    if(!d.exercises) d.exercises=DEFAULT_EXERCISES;
    if(!d.logs) d.logs={};
    if(!d.weights) d.weights=[];
    if(!d.targetLog) d.targetLog=[];
    return d;
  } catch { return null; }
}
const saveData  = d => { try { localStorage.setItem(KEY,JSON.stringify(d)); } catch {} };
const emptyData = () => ({weights:[],logs:{},exercises:DEFAULT_EXERCISES,targetLog:[]});

// ── UI helpers ──
function Sheet({onClose,children}) {
  return h('div',{onClick:onClose,style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'}},
    h('div',{onClick:e=>e.stopPropagation(),style:{background:'white',borderRadius:'20px 20px 0 0',padding:24,width:'100%',maxWidth:430,maxHeight:'88vh',overflowY:'auto'}},children));
}
function EmojiPicker({value,onChange}) {
  return h('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},
    ...EMOJIS.map(e=>h('button',{key:e,onClick:()=>onChange(e),style:{fontSize:22,padding:'4px 6px',borderRadius:8,border:`2px solid ${value===e?'#667eea':'transparent'}`,background:value===e?'#f0f0ff':'white',cursor:'pointer'}},e)));
}

// ── Heatmap Calendar ──
function HeatmapCalendar({data,exercises,year,month}) {
  const firstDay    = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const today       = localToday();
  const cells = [];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const logs    = data.logs[dateStr]||{};
    const full    = isFullRoutine(logs,exercises);
    const any     = hasAnyLog(logs,exercises);
    const cnt     = completedExCount(logs,exercises);
    cells.push({d,dateStr,full,any,cnt});
  }
  return h('div',null,
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3,marginBottom:3}},
      ...DAYS_KO.map((d,i)=>h('div',{key:d,style:{textAlign:'center',fontSize:10,color:i===0?'#f44336':i===6?'#2196f3':'#bbb',fontWeight:600,padding:'2px 0'}},d))
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}},
      ...cells.map((cell,i)=>{
        if(!cell) return h('div',{key:`e${i}`,style:{aspectRatio:'1'}});
        const isToday = cell.dateStr===today;
        const bg      = cell.full?'linear-gradient(135deg,#43e97b,#38f9d7)':cell.any?(cell.cnt/Math.max(exercises.length,1)>0.5?'#bef5cd':'#e8f5e9'):'#f0f0f0';
        const textClr = cell.full?'white':cell.any?'#2e7d32':'#bbb';
        return h('div',{key:cell.d,style:{aspectRatio:'1',borderRadius:6,background:bg,display:'flex',alignItems:'center',justifyContent:'center',border:isToday?'2px solid #667eea':'2px solid transparent',position:'relative',boxShadow:cell.full?'0 2px 6px rgba(67,233,123,0.35)':'none'}},
          h('span',{style:{fontSize:11,fontWeight:isToday?800:600,color:textClr,lineHeight:1}},cell.d),
          cell.full&&h('span',{style:{position:'absolute',top:-4,right:-2,fontSize:9,lineHeight:1}},'⭐')
        );
      })
    )
  );
}

// ── Monthly Stats ──
function MonthlyStats({data,exercises,year,month}) {
  const daysInMonth = new Date(year,month+1,0).getDate();
  const today       = localToday();
  const [ty,tm,td]  = today.split('-').map(Number);
  const isCurrent   = ty===year && (tm-1)===month;
  const maxDay      = isCurrent ? parseInt(td) : daysInMonth;

  const dates = [];
  for(let d=1;d<=maxDay;d++)
    dates.push(`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);

  const fullDays   = dates.filter(dt=>isFullRoutine(data.logs[dt]||{},exercises)).length;
  const activeDays = dates.filter(dt=>hasAnyLog(data.logs[dt]||{},exercises)).length;

  return h('div',null,
    // 요약 카드
    h('div',{style:{display:'flex',gap:8,marginBottom:16}},
      h('div',{style:{flex:1,background:'linear-gradient(135deg,#43e97b,#38f9d7)',borderRadius:14,padding:'12px 0',textAlign:'center',boxShadow:'0 2px 10px rgba(67,233,123,0.3)'}},
        h('div',{style:{fontSize:24,fontWeight:800,color:'white'}},fullDays,'일'),
        h('div',{style:{fontSize:11,color:'rgba(255,255,255,0.9)',marginTop:2}},'⭐ 전체 루틴 달성')
      ),
      h('div',{style:{flex:1,background:'#f0f0ff',borderRadius:14,padding:'12px 0',textAlign:'center'}},
        h('div',{style:{fontSize:24,fontWeight:800,color:'#667eea'}},activeDays,'일'),
        h('div',{style:{fontSize:11,color:'#9e9e9e',marginTop:2}},'운동한 날')
      ),
      h('div',{style:{flex:1,background:'#f8f9fa',borderRadius:14,padding:'12px 0',textAlign:'center'}},
        h('div',{style:{fontSize:24,fontWeight:800,color:'#555'}},`${maxDay}일`),
        h('div',{style:{fontSize:11,color:'#9e9e9e',marginTop:2}},isCurrent?'오늘까지':'이달 전체')
      )
    ),
    // 운동별 달성률
    h('div',null,
      h('div',{style:{fontSize:12,fontWeight:600,color:'#888',marginBottom:10}},'운동별 목표 달성률'),
      exercises.length===0&&h('div',{style:{textAlign:'center',color:'#ccc',padding:'16px 0',fontSize:13}},'등록된 운동이 없어요'),
      ...exercises.map(ex=>{
        const hitDays = dates.filter(dt=>getDoneFromLogs(data.logs[dt]||{},ex.id)>=ex.target).length;
        const pct     = maxDay>0 ? Math.round((hitDays/maxDay)*100) : 0;
        const barClr  = pct>=80?'linear-gradient(90deg,#43e97b,#38f9d7)':pct>=50?'linear-gradient(90deg,#ffa726,#ff7043)':'linear-gradient(90deg,#90a4ae,#78909c)';
        const numClr  = pct>=80?'#2e7d32':pct>=50?'#e65100':'#9e9e9e';
        return h('div',{key:ex.id,style:{marginBottom:12}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}},
            h('span',{style:{fontSize:13,fontWeight:600,color:'#333'}},ex.emoji,' ',ex.label),
            h('div',{style:{textAlign:'right'}},
              h('span',{style:{fontSize:13,fontWeight:800,color:numClr}},`${pct}%`),
              h('span',{style:{fontSize:11,color:'#bbb',marginLeft:4}},`(${hitDays}/${maxDay}일)`)
            )
          ),
          h('div',{style:{background:'#f0f0f0',borderRadius:99,height:9}},
            h('div',{style:{background:barClr,height:'100%',borderRadius:99,width:`${pct}%`,transition:'width 0.4s'}})
          )
        );
      })
    )
  );
}

function App() {
  const [data,setData]           = useState(()=>loadData()||emptyData());
  const [tab,setTab]             = useState('today');
  const [logModal,setLogModal]   = useState(null);
  const [logInput,setLogInput]   = useState('');
  const [addModal,setAddModal]   = useState(false);
  const [editModal,setEditModal] = useState(null);
  const [wInput,setWInput]       = useState('');
  const [toast,setToast]         = useState(null);
  const toastRef = useRef(null);
  const [fLabel,setFLabel]   = useState('');
  const [fEmoji,setFEmoji]   = useState('🏃');
  const [fTarget,setFTarget] = useState('');
  const [fUnit,setFUnit]     = useState('개');

  const now = new Date();
  const [viewYear,setViewYear]   = useState(now.getFullYear());
  const [viewMonth,setViewMonth] = useState(now.getMonth());

  useEffect(()=>{saveData(data);},[data]);

  const showToast=(msg,type='ok')=>{
    setToast({msg,type});
    clearTimeout(toastRef.current);
    toastRef.current=setTimeout(()=>setToast(null),2200);
  };

  const tod       = localToday();
  const exercises = data.exercises;
  const todLogs   = data.logs[tod]||{};
  const todWeight = data.weights.find(w=>w.date===tod);
  const recentW   = data.weights.slice(-10);
  const startW    = data.weights.length?data.weights[0].weight:null;
  const latestW   = data.weights.length?data.weights[data.weights.length-1].weight:null;
  const lost      = (startW&&latestW)?(startW-latestW).toFixed(1):null;

  const getDone=(id,lo)=>getDoneFromLogs(lo||todLogs,id);
  const todayFull      = isFullRoutine(todLogs,exercises);
  const completedCount = completedExCount(todLogs,exercises);

  const submitW=()=>{
    const w=parseFloat(wInput);
    if(isNaN(w)||w<30||w>200) return;
    setData(p=>({...p,weights:[...p.weights.filter(x=>x.date!==tod),{date:tod,weight:w}].sort((a,b)=>a.date.localeCompare(b.date))}));
    setWInput(''); showToast('✅ 몸무게 저장됨!');
  };

  const submitLog=()=>{
    const amt=parseFloat(logInput);
    if(!logModal||isNaN(amt)||amt<=0) return;
    const id=logModal;
    setData(p=>{
      const pl=p.logs||{},pd=pl[tod]||{},pe=pd[id]||[];
      return {...p,logs:{...pl,[tod]:{...pd,[id]:[...pe,{amount:amt,time:fmtTime()}]}}};
    });
    setLogInput(''); setLogModal(null);
    showToast(`+${amt} 기록됨 💪`);
  };
  const undoLast=id=>{
    setData(p=>{
      const pl=p.logs||{},pd=pl[tod]||{},pe=[...(pd[id]||[])];
      if(!pe.length) return p;
      pe.pop();
      return {...p,logs:{...pl,[tod]:{...pd,[id]:pe}}};
    });
  };

  const openAdd=()=>{setFLabel('');setFEmoji('🏃');setFTarget('');setFUnit('개');setAddModal(true);};
  const submitAdd=()=>{
    const t=parseFloat(fTarget);
    if(!fLabel.trim()||isNaN(t)||t<=0) return;
    setData(p=>({...p,exercises:[...p.exercises,{id:uid(),label:fLabel.trim(),emoji:fEmoji,target:t,unit:fUnit}]}));
    setAddModal(false); showToast('✅ 추가됨!');
  };

  const openEdit=ex=>{setEditModal(ex);setFLabel(ex.label);setFEmoji(ex.emoji);setFTarget(String(ex.target));setFUnit(ex.unit);};
  const submitEdit=()=>{
    if(!editModal) return;
    const t=parseFloat(fTarget);
    if(!fLabel.trim()||isNaN(t)||t<=0) return;
    if(t<editModal.target){showToast('목표는 줄일 수 없어요','err');return;}
    const updated={...editModal,label:fLabel.trim(),emoji:fEmoji,target:t,unit:fUnit};
    setData(p=>({...p,
      exercises:p.exercises.map(e=>e.id===editModal.id?updated:e),
      ...(t>editModal.target?{targetLog:[...(p.targetLog||[]),{date:tod,id:editModal.id,label:editModal.label,from:editModal.target,to:t,unit:fUnit}]}:{})
    }));
    setEditModal(null); showToast('✅ 수정됨!');
  };
  const deleteEx=id=>{setData(p=>({...p,exercises:p.exercises.filter(e=>e.id!==id)}));setEditModal(null);showToast('삭제됨');};

  // weight chart
  const minW2=recentW.length?Math.min(...recentW.map(w=>w.weight))-0.5:80;
  const maxW2=recentW.length?Math.max(...recentW.map(w=>w.weight))+0.5:90;
  const rng=maxW2-minW2||1, CH=60, CW=200;
  const toY=w=>CH-((w-minW2)/rng)*CH;
  const toX=i=>recentW.length<2?CW/2:(i/(recentW.length-1))*CW;
  const miniPts=recentW.map((w,i)=>`${toX(i)},${toY(w.weight)}`).join(' ');

  const bigW=data.weights.slice(-14);
  const bMin=bigW.length?Math.min(...bigW.map(w=>w.weight))-0.5:80;
  const bMax=bigW.length?Math.max(...bigW.map(w=>w.weight))+0.5:90;
  const bRng=bMax-bMin||1, BCH=130, BCW=300;
  const bY=w=>BCH-((w-bMin)/bRng)*BCH;
  const bX=i=>bigW.length<2?BCW/2:(i/(bigW.length-1))*BCW;
  const bigPts=bigW.map((w,i)=>`${bX(i)},${bY(w.weight)}`).join(' ');

  const isCurrentMonth = viewYear===now.getFullYear()&&viewMonth===now.getMonth();
  const goPrev=()=>{ if(viewMonth===0){setViewYear(y=>y-1);setViewMonth(11);}else setViewMonth(m=>m-1); };
  const goNext=()=>{ if(isCurrentMonth) return; if(viewMonth===11){setViewYear(y=>y+1);setViewMonth(0);}else setViewMonth(m=>m+1); };

  return h('div',{style:{maxWidth:430,margin:'0 auto',background:'#f8f9fa',minHeight:'100vh',paddingBottom:40}},

    toast&&h('div',{style:{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',zIndex:400,background:toast.type==='err'?'#f44336':'#1a1a2e',color:'white',borderRadius:14,padding:'13px 22px',fontSize:13,fontWeight:600,boxShadow:'0 4px 20px rgba(0,0,0,0.3)',maxWidth:320,textAlign:'center'}},toast.msg),

    // Log Modal
    logModal&&(()=>{
      const ex=exercises.find(e=>e.id===logModal); if(!ex) return null;
      const done=getDone(logModal), val=parseFloat(logInput), ok=!isNaN(val)&&val>0;
      const entries=todLogs[logModal]||[];
      return h(Sheet,{onClose:()=>setLogModal(null)},
        h('div',{style:{fontSize:16,fontWeight:700,marginBottom:2}},`${ex.emoji} ${ex.label}`),
        h('div',{style:{fontSize:13,color:'#999',marginBottom:12}},'오늘: ',h('b',{style:{color:'#667eea'}},done),`/${ex.target}${ex.unit}`,done<ex.target&&` · 남은 ${ex.target-done}${ex.unit}`),
        entries.length>0&&h('div',{style:{background:'#f8f9fa',borderRadius:10,padding:'10px 12px',marginBottom:12}},
          ...entries.map((e,i)=>h('div',{key:i,style:{display:'flex',justifyContent:'space-between',fontSize:13,padding:'3px 0',color:'#555'}},h('span',{style:{color:'#aaa'}},e.time),h('span',null,`+${e.amount}${ex.unit}`))),
          h('div',{style:{borderTop:'1px solid #eee',marginTop:6,paddingTop:6,display:'flex',justifyContent:'space-between',fontWeight:700,fontSize:13}},h('span',{style:{color:'#aaa'}},'합계'),h('span',{style:{color:'#667eea'}},`${done}${ex.unit}`))
        ),
        h('div',{style:{display:'flex',gap:8,marginBottom:8}},
          h('input',{type:'number',autoFocus:true,min:1,placeholder:`몇 ${ex.unit}?`,value:logInput,onChange:e=>setLogInput(e.target.value),onKeyDown:e=>e.key==='Enter'&&ok&&submitLog(),style:{flex:1,padding:'12px 14px',borderRadius:10,border:`1.5px solid ${ok?'#667eea':'#ddd'}`,fontSize:16,outline:'none'}}),
          h('button',{onClick:submitLog,disabled:!ok,style:{padding:'12px 20px',borderRadius:10,border:'none',background:ok?'linear-gradient(135deg,#667eea,#764ba2)':'#eee',color:ok?'white':'#bbb',fontWeight:700,fontSize:15,cursor:'pointer'}},'추가')
        ),
        h('div',{style:{display:'flex',gap:8}},
          entries.length>0&&h('button',{onClick:()=>{undoLast(logModal);setLogModal(null);},style:{flex:1,padding:'10px 0',borderRadius:10,border:'1.5px solid #eee',background:'white',color:'#f44336',fontSize:13,cursor:'pointer',fontWeight:600}},'↩ 마지막 취소'),
          h('button',{onClick:()=>setLogModal(null),style:{flex:1,padding:'10px 0',borderRadius:10,border:'1.5px solid #eee',background:'white',color:'#999',fontSize:13,cursor:'pointer'}},'닫기')
        )
      );
    })(),

    // Add Modal
    addModal&&h(Sheet,{onClose:()=>setAddModal(false)},
      h('div',{style:{fontSize:16,fontWeight:700,marginBottom:14}},'➕ 운동 추가'),
      h('div',{style:{fontSize:13,color:'#888',marginBottom:8}},'이모지'),
      h(EmojiPicker,{value:fEmoji,onChange:setFEmoji}),
      h('input',{value:fLabel,onChange:e=>setFLabel(e.target.value),placeholder:'운동 이름',style:{width:'100%',padding:'11px 14px',borderRadius:10,border:'1.5px solid #ddd',fontSize:15,outline:'none',marginTop:10,marginBottom:10}}),
      h('div',{style:{display:'flex',gap:8,marginBottom:16}},
        h('input',{type:'number',min:1,value:fTarget,onChange:e=>setFTarget(e.target.value),placeholder:'목표',style:{flex:1,padding:'11px 14px',borderRadius:10,border:'1.5px solid #ddd',fontSize:15,outline:'none'}}),
        h('select',{value:fUnit,onChange:e=>setFUnit(e.target.value),style:{padding:'11px 14px',borderRadius:10,border:'1.5px solid #ddd',fontSize:15,outline:'none',background:'white',cursor:'pointer'}},
          ...UNITS.map(u=>h('option',{key:u,value:u},u)))
      ),
      h('div',{style:{display:'flex',gap:8}},
        h('button',{onClick:()=>setAddModal(false),style:{flex:1,padding:'12px 0',borderRadius:10,border:'1.5px solid #eee',background:'white',color:'#999',fontSize:14,cursor:'pointer'}},'취소'),
        h('button',{onClick:submitAdd,disabled:!fLabel.trim()||!(parseFloat(fTarget)>0),style:{flex:2,padding:'12px 0',borderRadius:10,border:'none',background:fLabel.trim()&&parseFloat(fTarget)>0?'linear-gradient(135deg,#667eea,#764ba2)':'#eee',color:fLabel.trim()&&parseFloat(fTarget)>0?'white':'#bbb',fontWeight:700,fontSize:14,cursor:'pointer'}},'추가')
      )
    ),

    // Edit Modal
    editModal&&h(Sheet,{onClose:()=>setEditModal(null)},
      h('div',{style:{fontSize:16,fontWeight:700,marginBottom:14}},'✏️ 운동 수정'),
      h('div',{style:{fontSize:13,color:'#888',marginBottom:8}},'이모지'),
      h(EmojiPicker,{value:fEmoji,onChange:setFEmoji}),
      h('input',{value:fLabel,onChange:e=>setFLabel(e.target.value),placeholder:'운동 이름',style:{width:'100%',padding:'11px 14px',borderRadius:10,border:'1.5px solid #ddd',fontSize:15,outline:'none',marginTop:10,marginBottom:10}}),
      h('div',{style:{fontSize:13,color:'#888',marginBottom:6}},`목표 (현재 ${editModal.target}${editModal.unit} · 낮추기 불가)`),
      h('div',{style:{display:'flex',gap:8,marginBottom:16}},
        h('input',{type:'number',min:editModal.target,value:fTarget,onChange:e=>setFTarget(e.target.value),style:{flex:1,padding:'11px 14px',borderRadius:10,border:'1.5px solid #ddd',fontSize:15,outline:'none'}}),
        h('select',{value:fUnit,onChange:e=>setFUnit(e.target.value),style:{padding:'11px 14px',borderRadius:10,border:'1.5px solid #ddd',fontSize:15,outline:'none',background:'white',cursor:'pointer'}},
          ...UNITS.map(u=>h('option',{key:u,value:u},u)))
      ),
      h('div',{style:{display:'flex',gap:8,marginBottom:8}},
        h('button',{onClick:()=>setEditModal(null),style:{flex:1,padding:'12px 0',borderRadius:10,border:'1.5px solid #eee',background:'white',color:'#999',fontSize:14,cursor:'pointer'}},'취소'),
        h('button',{onClick:submitEdit,style:{flex:2,padding:'12px 0',borderRadius:10,border:'none',background:'linear-gradient(135deg,#667eea,#764ba2)',color:'white',fontWeight:700,fontSize:14,cursor:'pointer'}},'저장')
      ),
      h('button',{onClick:()=>deleteEx(editModal.id),style:{width:'100%',padding:'11px 0',borderRadius:10,border:'1.5px solid #ffcdd2',background:'#fff5f5',color:'#e53935',fontSize:14,cursor:'pointer',fontWeight:600}},'🗑 삭제')
    ),

    // ── Header ──
    h('div',{style:{background:'linear-gradient(135deg,#667eea 0%,#764ba2 100%)',padding:'48px 20px 0',color:'white'}},
      h('div',{style:{fontSize:11,opacity:0.7,marginBottom:2}},`📅 ${tod.slice(5).replace('-','/')} (${DAYS_KO[new Date().getDay()]})`),
      h('div',{style:{fontSize:13,opacity:0.8,marginBottom:14}},'💪 다이어트 트래커'),

      // 몸무게 카드
      h('div',{style:{background:'rgba(255,255,255,0.15)',borderRadius:16,padding:16,marginBottom:10,backdropFilter:'blur(10px)'}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:recentW.length>=2?10:0}},
          h('div',null,
            h('div',{style:{fontSize:11,opacity:0.8,marginBottom:2}},'⚖️ 몸무게'),
            h('div',{style:{fontSize:36,fontWeight:800,lineHeight:1}},latestW??'--',h('span',{style:{fontSize:18,fontWeight:500}},'kg')),
            lost!==null&&h('div',{style:{fontSize:13,marginTop:4,color:parseFloat(lost)>0?'#a8edbc':'rgba(255,255,255,0.7)'}},
              parseFloat(lost)>0?`▼ ${lost}kg 감량`:parseFloat(lost)<0?`▲ ${Math.abs(lost)}kg 증가`:'변화없음',
              startW&&h('span',{style:{fontSize:11,opacity:0.7}},` (시작 ${startW}kg)`)
            )
          ),
          h('div',{style:{display:'flex',gap:6,alignItems:'center'}},
            h('input',{type:'number',step:0.1,inputMode:'decimal',placeholder:'오늘 몸무게',value:wInput,onChange:e=>setWInput(e.target.value),onKeyDown:e=>e.key==='Enter'&&submitW(),style:{width:110,padding:'8px 10px',borderRadius:10,border:'none',background:'rgba(255,255,255,0.9)',fontSize:14,outline:'none',color:'#333'}}),
            h('button',{onClick:submitW,style:{padding:'8px 12px',borderRadius:10,border:'none',background:'rgba(255,255,255,0.25)',color:'white',fontWeight:700,fontSize:13,cursor:'pointer'}},'기록')
          )
        ),
        recentW.length>=2&&h('svg',{viewBox:`-4 -8 ${CW+8} ${CH+20}`,width:'100%',style:{overflow:'visible'}},
          h('defs',null,h('linearGradient',{id:'mg',x1:'0',y1:'0',x2:'1',y2:'0'},h('stop',{offset:'0%',stopColor:'rgba(255,255,255,0.4)'}),h('stop',{offset:'100%',stopColor:'white'}))),
          h('polyline',{fill:'none',stroke:'url(#mg)',strokeWidth:2.5,strokeLinejoin:'round',strokeLinecap:'round',points:miniPts}),
          ...recentW.map((w,i)=>h('g',{key:i},
            h('circle',{cx:toX(i),cy:toY(w.weight),r:3,fill:'white',opacity:0.9}),
            (i===0||i===recentW.length-1)&&h('text',{x:toX(i),y:toY(w.weight)-7,textAnchor:'middle',fontSize:9,fill:'white',opacity:0.85,fontWeight:600},w.weight)
          ))
        ),
        todWeight&&h('div',{style:{fontSize:11,opacity:0.7,marginTop:6,textAlign:'right'}},`오늘 ${todWeight.weight}kg ✅`)
      ),

      // 운동 요약
      h('div',{style:{background:'rgba(255,255,255,0.15)',borderRadius:16,padding:'12px 16px',backdropFilter:'blur(10px)'}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
          h('div',{style:{fontSize:11,opacity:0.8}},'🏃 오늘 운동'),
          todayFull
            ?h('div',{style:{background:'rgba(67,233,123,0.35)',padding:'3px 12px',borderRadius:99,fontSize:12,fontWeight:700}},'⭐ 전체 달성!')
            :h('div',{style:{fontSize:13,fontWeight:700}},`${completedCount}/${exercises.length} 완료`)
        ),
        h('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},
          ...exercises.map(ex=>{
            const done=getDone(ex.id),completed=done>=ex.target,pct=Math.min(100,(done/ex.target)*100);
            return h('div',{key:ex.id,style:{flex:'1 1 calc(50% - 3px)',minWidth:120}},
              h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:3}},
                h('span',null,ex.emoji,' ',ex.label),
                h('span',{style:{fontWeight:700,color:completed?'#a8edbc':'white'}},`${done}/${ex.target}`)
              ),
              h('div',{style:{background:'rgba(255,255,255,0.2)',borderRadius:99,height:5}},
                h('div',{style:{background:completed?'#a8edbc':'white',borderRadius:99,height:'100%',width:`${pct}%`,transition:'width 0.3s'}})
              )
            );
          })
        )
      ),

      // 탭
      h('div',{style:{display:'flex',marginTop:14}},
        ...['today','history'].map(key=>h('button',{key,onClick:()=>setTab(key),style:{flex:1,padding:'13px 0',border:'none',background:'none',cursor:'pointer',fontWeight:tab===key?700:400,color:'white',opacity:tab===key?1:0.55,borderBottom:tab===key?'2px solid white':'2px solid transparent',fontSize:14}},key==='today'?'오늘 운동':'기록·통계'))
      )
    ),

    h('div',{style:{padding:16}},

      // ── 오늘 탭 ──
      tab==='today'&&h('div',null,
        h('div',{style:{background:'white',borderRadius:16,padding:16,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
            h('div',null,
              h('div',{style:{fontSize:14,fontWeight:600,color:'#444'}},'오늘의 운동'),
              h('div',{style:{fontSize:12,color:todayFull?'#4caf50':'#aaa',marginTop:2}},
                todayFull?'⭐ 전체 루틴 달성!':completedCount===0?'아직 시작 전이에요':`${completedCount}/${exercises.length} 완료`)
            ),
            h('button',{onClick:openAdd,style:{padding:'8px 14px',borderRadius:10,border:'none',background:'linear-gradient(135deg,#667eea,#764ba2)',color:'white',fontWeight:700,fontSize:13,cursor:'pointer'}},'+ 운동 추가')
          ),
          exercises.length===0&&h('div',{style:{textAlign:'center',color:'#ccc',padding:'32px 0',fontSize:14}},'운동을 추가해보세요!'),
          ...exercises.map(ex=>{
            const done=getDone(ex.id),pct=Math.min(100,(done/ex.target)*100),completed=done>=ex.target;
            const entries=todLogs[ex.id]||[];
            return h('div',{key:ex.id,style:{marginBottom:22}},
              h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:6}},
                h('span',{style:{fontSize:22}},ex.emoji),
                h('span',{style:{fontWeight:700,fontSize:15,color:completed?'#4caf50':'#222',flex:1}},ex.label,completed&&' ✅'),
                h('button',{onClick:()=>openEdit(ex),style:{padding:'4px 10px',borderRadius:6,border:'1.5px solid #e8e8e8',background:'white',color:'#aaa',fontSize:12,cursor:'pointer'}},'수정')
              ),
              h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:7}},
                h('div',{style:{flex:1,background:'#f0f0f0',borderRadius:99,height:10,overflow:'hidden'}},
                  h('div',{style:{background:completed?'linear-gradient(90deg,#43e97b,#38f9d7)':'linear-gradient(90deg,#667eea,#764ba2)',borderRadius:99,height:'100%',width:`${pct}%`,transition:'width 0.35s'}})
                ),
                h('span',{style:{fontSize:13,fontWeight:700,color:completed?'#4caf50':'#667eea',minWidth:72,textAlign:'right'}},`${done}/${ex.target}${ex.unit}`)
              ),
              entries.length>0&&h('div',{style:{display:'flex',flexWrap:'wrap',gap:5,marginBottom:7}},
                ...entries.map((e,i)=>h('span',{key:i,style:{background:'#ede7f6',color:'#5c35b5',borderRadius:20,padding:'4px 11px',fontSize:12,fontWeight:600}},`+${e.amount}${ex.unit}`,h('span',{style:{color:'#b39ddb',fontWeight:400,fontSize:11}},` ${e.time}`)))
              ),
              h('button',{onClick:()=>{setLogModal(ex.id);setLogInput('');},style:{width:'100%',padding:'10px 0',borderRadius:10,border:completed?'1.5px solid #c8f0d4':'1.5px dashed #c5cae9',background:completed?'#f0fdf4':'#f5f6ff',color:completed?'#43a047':'#667eea',fontWeight:600,fontSize:13,cursor:'pointer'}},
                completed?'✓ 완료 · 더 추가하기':'+ 기록 추가')
            );
          })
        )
      ),

      // ── 기록·통계 탭 ──
      tab==='history'&&h('div',null,

        // 월별 히트맵 + 통계
        h('div',{style:{background:'white',borderRadius:16,padding:16,marginBottom:16,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}},

          // 월 네비게이션
          h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}},
            h('button',{onClick:goPrev,style:{width:36,height:36,borderRadius:10,border:'1.5px solid #eee',background:'white',color:'#667eea',fontSize:18,cursor:'pointer',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}},'‹'),
            h('div',{style:{textAlign:'center'}},
              h('div',{style:{fontSize:16,fontWeight:700,color:'#333'}},`${viewYear}년 ${viewMonth+1}월`),
              h('div',{style:{fontSize:11,color:'#bbb',marginTop:2}},'⭐ = 전체 루틴 달성일')
            ),
            h('button',{onClick:goNext,disabled:isCurrentMonth,style:{width:36,height:36,borderRadius:10,border:'1.5px solid #eee',background:'white',color:isCurrentMonth?'#ddd':'#667eea',fontSize:18,cursor:isCurrentMonth?'default':'pointer',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}},'›')
          ),

          // 범례
          h('div',{style:{display:'flex',gap:14,marginBottom:14,alignItems:'center'}},
            ...[
              {bg:'linear-gradient(135deg,#43e97b,#38f9d7)',label:'전체 달성 ⭐'},
              {bg:'#bef5cd',label:'일부 달성'},
              {bg:'#f0f0f0',label:'기록 없음'},
            ].map(({bg,label})=>h('div',{key:label,style:{display:'flex',alignItems:'center',gap:5}},
              h('div',{style:{width:14,height:14,borderRadius:3,background:bg,flexShrink:0}}),
              h('span',{style:{fontSize:11,color:'#666'}},label)
            ))
          ),

          h(HeatmapCalendar,{data,exercises,year:viewYear,month:viewMonth}),
          h('div',{style:{borderTop:'1px solid #f0f0f0',margin:'16px 0'}}),
          h(MonthlyStats,{data,exercises,year:viewYear,month:viewMonth})
        ),

        // 몸무게 차트
        h('div',{style:{background:'white',borderRadius:16,padding:16,marginBottom:16,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}},
          h('div',{style:{fontSize:14,fontWeight:600,color:'#444',marginBottom:14}},'📉 몸무게 변화'),
          bigW.length<2
            ?h('div',{style:{textAlign:'center',color:'#ccc',padding:'32px 0',fontSize:13}},'몸무게를 2일 이상 기록하면 그래프가 나타나요')
            :h('svg',{viewBox:`-14 -14 ${BCW+28} ${BCH+36}`,width:'100%',style:{overflow:'visible'}},
              h('defs',null,h('linearGradient',{id:'bg',x1:'0',y1:'0',x2:'1',y2:'0'},h('stop',{offset:'0%',stopColor:'#667eea'}),h('stop',{offset:'100%',stopColor:'#764ba2'}))),
              h('polyline',{fill:'none',stroke:'url(#bg)',strokeWidth:3,strokeLinejoin:'round',strokeLinecap:'round',points:bigPts}),
              ...bigW.map((w,i)=>h('g',{key:i},
                h('circle',{cx:bX(i),cy:bY(w.weight),r:5,fill:'#764ba2',stroke:'white',strokeWidth:2}),
                h('text',{x:bX(i),y:bY(w.weight)-10,textAnchor:'middle',fontSize:10,fill:'#555',fontWeight:600},w.weight),
                (i===0||i===bigW.length-1||bigW.length<=7)&&h('text',{x:bX(i),y:BCH+22,textAnchor:'middle',fontSize:9,fill:'#bbb'},fmtDate(w.date))
              ))
            ),
          data.weights.length>0&&h('div',{style:{marginTop:14}},
            ...[...data.weights].reverse().map((w,i)=>{
              const prev=data.weights[data.weights.length-1-i-1];
              const diff=prev?(w.weight-prev.weight).toFixed(1):null;
              return h('div',{key:w.date,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom:'1px solid #f5f5f5'}},
                h('div',{style:{color:'#888',fontSize:13}},w.date.replace(/-/g,'/')),
                h('div',{style:{display:'flex',alignItems:'center',gap:10}},
                  diff!==null&&h('span',{style:{fontSize:12,color:parseFloat(diff)<0?'#4caf50':parseFloat(diff)>0?'#f44336':'#ccc',fontWeight:600}},parseFloat(diff)>0?`+${diff}`:diff,'kg'),
                  h('span',{style:{fontWeight:700,fontSize:16,color:'#222'}},w.weight,'kg')
                )
              );
            })
          )
        )
      )
    )
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
