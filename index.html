<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>💪 다이어트 트래커</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #f8f9fa; min-height: 100vh; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { createElement as h, useState, useEffect, useRef } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';

const EX = {
  squat:   { label:'스쿼트',       emoji:'🦵', value:100, unit:'개' },
  pushup:  { label:'팔굽혀펴기',   emoji:'💪', value:60,  unit:'개' },
  hangbar: { label:'철봉 매달리기', emoji:'🏋️', value:2,   unit:'분' },
  pullup:  { label:'턱걸이',       emoji:'⬆️', value:10,  unit:'개' },
  stairs:  { label:'계단오르기',   emoji:'🪜', value:2,   unit:'회' },
};
const IDS = ['squat','pushup','hangbar','pullup','stairs'];
const KEY = 'fit-tracker-v1';

const today = () => new Date().toISOString().slice(0,10);
const fmtDate = s => { const [,m,d]=s.split('-'); return `${+m}/${+d}`; };
const fmtTime = () => { const n=new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; };
const defTargets = () => { const t={}; IDS.forEach(id=>{t[id]=EX[id].value;}); return t; };
const load = () => {
  try {
    const r=localStorage.getItem(KEY); if(!r) return null;
    const d=JSON.parse(r);
    if(!d.targets) d.targets=defTargets();
    if(!d.logs) d.logs={};
    if(!d.weights) d.weights=[];
    if(!d.targetLog) d.targetLog=[];
    return d;
  } catch{return null;}
};
const save = d => { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch{} };

function App() {
  const [data, setData] = useState(() => load() || {weights:[],logs:{},targets:defTargets(),targetLog:[]});
  const [tab, setTab] = useState('today');
  const [logModal, setLogModal] = useState(null);
  const [logInput, setLogInput] = useState('');
  const [tgtEdit, setTgtEdit] = useState(null);
  const [tgtInput, setTgtInput] = useState('');
  const [wInput, setWInput] = useState('');
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);

  useEffect(() => { save(data); }, [data]);

  const showToast = (msg, type='ok') => {
    setToast({msg,type});
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(()=>setToast(null), 2300);
  };

  const tod = today();
  const targets = data.targets;
  const todLogs = data.logs[tod] || {};
  const todWeight = data.weights.find(w=>w.date===tod);
  const startW = data.weights.length ? data.weights[0].weight : 86;
  const latestW = data.weights.length ? data.weights[data.weights.length-1].weight : null;
  const lost = latestW ? (startW - latestW).toFixed(1) : 0;

  const getDone = (id, logs) => ((logs||todLogs)[id]||[]).reduce((s,e)=>s+e.amount,0);

  const submitW = () => {
    const w = parseFloat(wInput);
    if (isNaN(w)||w<30||w>200) return;
    setData(p => ({ ...p, weights: [...p.weights.filter(x=>x.date!==tod), {date:tod,weight:w}].sort((a,b)=>a.date.localeCompare(b.date)) }));
    setWInput('');
    showToast('✅ 몸무게 저장됨!');
  };

  const submitLog = () => {
    const amt = parseFloat(logInput);
    if (!logModal || isNaN(amt) || amt<=0) return;
    const id = logModal;
    setData(p => {
      const pl=p.logs||{}, pd=pl[tod]||{}, pe=pd[id]||[];
      return {...p, logs:{...pl,[tod]:{...pd,[id]:[...pe,{amount:amt,time:fmtTime()}]}}};
    });
    setLogInput(''); setLogModal(null);
    showToast(`+${amt}${EX[id].unit} 기록됨 💪`);
  };

  const undoLast = id => {
    setData(p => {
      const pl=p.logs||{},pd=pl[tod]||{},pe=[...(pd[id]||[])];
      if (!pe.length) return p;
      pe.pop();
      return {...p, logs:{...pl,[tod]:{...pd,[id]:pe}}};
    });
  };

  const confirmTgt = () => {
    const id = tgtEdit;
    const nv = parseFloat(tgtInput);
    if (!id||isNaN(nv)||nv<=targets[id]) { setTgtEdit(null); return; }
    setData(p => ({...p, targets:{...p.targets,[id]:nv}, targetLog:[...(p.targetLog||[]),{date:tod,id,from:targets[id],to:nv}]}));
    setTgtEdit(null);
    showToast(`목표 → ${nv}${EX[id].unit} ✅`);
  };

  const done_count = IDS.filter(id=>getDone(id)>=targets[id]).length;

  // ── Chart data ──
  const cw = data.weights.slice(-14);
  const minW2 = cw.length?Math.min(...cw.map(w=>w.weight))-0.5:83;
  const maxW2 = cw.length?Math.max(...cw.map(w=>w.weight))+0.5:87;
  const rng = maxW2-minW2||1;
  const CH=130, CW=300;
  const toY = w => CH-((w-minW2)/rng)*CH;
  const toX = i => cw.length<2?CW/2:(i/(cw.length-1))*CW;
  const pts = cw.map((w,i)=>`${toX(i)},${toY(w.weight)}`).join(' ');

  // ── Exercise stats (last 14 days) ──
  const last14 = () => {
    const dates = Object.keys(data.logs).sort().slice(-14);
    return dates;
  };
  const exStatDates = last14();

  return h('div', {style:{maxWidth:430,margin:'0 auto',background:'#f8f9fa',minHeight:'100vh',paddingBottom:40}},

    toast && h('div', {style:{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',zIndex:300,background:toast.type==='err'?'#f44336':'#1a1a2e',color:'white',borderRadius:14,padding:'13px 22px',fontSize:13,fontWeight:600,boxShadow:'0 4px 20px rgba(0,0,0,0.3)',maxWidth:320,textAlign:'center'}}, toast.msg),

    // Log Modal
    logModal && h('div', {style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:100,display:'flex',alignItems:'flex-end',justifyContent:'center'},onClick:()=>setLogModal(null)},
      h('div', {style:{background:'white',borderRadius:'20px 20px 0 0',padding:24,width:'100%',maxWidth:430},onClick:e=>e.stopPropagation()},
        h('div', {style:{fontSize:16,fontWeight:700,marginBottom:2}}, `${EX[logModal].emoji} ${EX[logModal].label}`),
        h('div', {style:{fontSize:13,color:'#999',marginBottom:12}},
          '오늘: ', h('b',{style:{color:'#667eea'}}, getDone(logModal)), `/${targets[logModal]}${EX[logModal].unit}`,
          getDone(logModal)<targets[logModal] && ` · 남은 ${targets[logModal]-getDone(logModal)}${EX[logModal].unit}`
        ),
        (todLogs[logModal]||[]).length>0 && h('div', {style:{background:'#f8f9fa',borderRadius:10,padding:'10px 12px',marginBottom:12}},
          ...(todLogs[logModal]||[]).map((e,i)=>h('div',{key:i,style:{display:'flex',justifyContent:'space-between',fontSize:13,padding:'3px 0',color:'#555'}},
            h('span',{style:{color:'#aaa'}},e.time), h('span',null,`+${e.amount}${EX[logModal].unit}`)
          )),
          h('div',{style:{borderTop:'1px solid #eee',marginTop:6,paddingTop:6,display:'flex',justifyContent:'space-between',fontWeight:700,fontSize:13}},
            h('span',{style:{color:'#aaa'}},'합계'), h('span',{style:{color:'#667eea'}},`${getDone(logModal)}${EX[logModal].unit}`)
          )
        ),
        h('div', {style:{display:'flex',gap:8,marginBottom:8}},
          h('input',{type:'number',autoFocus:true,min:1,placeholder:`몇 ${EX[logModal].unit}?`,value:logInput,
            onChange:e=>setLogInput(e.target.value),
            onKeyDown:e=>e.key==='Enter'&&parseFloat(logInput)>0&&submitLog(),
            style:{flex:1,padding:'12px 14px',borderRadius:10,border:`1.5px solid ${parseFloat(logInput)>0?'#667eea':'#ddd'}`,fontSize:16,outline:'none'}}),
          h('button',{onClick:submitLog,disabled:!(parseFloat(logInput)>0),style:{padding:'12px 20px',borderRadius:10,border:'none',background:parseFloat(logInput)>0?'linear-gradient(135deg,#667eea,#764ba2)':'#eee',color:parseFloat(logInput)>0?'white':'#bbb',fontWeight:700,fontSize:15,cursor:'pointer'}},'추가')
        ),
        h('div', {style:{display:'flex',gap:8}},
          (todLogs[logModal]||[]).length>0 && h('button',{onClick:()=>{undoLast(logModal);setLogModal(null);},style:{flex:1,padding:'10px 0',borderRadius:10,border:'1.5px solid #eee',background:'white',color:'#f44336',fontSize:13,cursor:'pointer',fontWeight:600}},'↩ 마지막 취소'),
          h('button',{onClick:()=>setLogModal(null),style:{flex:1,padding:'10px 0',borderRadius:10,border:'1.5px solid #eee',background:'white',color:'#999',fontSize:13,cursor:'pointer'}},'닫기')
        )
      )
    ),

    // Target Modal
    tgtEdit && h('div', {style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center'},onClick:()=>setTgtEdit(null)},
      h('div', {style:{background:'white',borderRadius:20,padding:24,width:300},onClick:e=>e.stopPropagation()},
        h('div',{style:{fontSize:15,fontWeight:700,marginBottom:4}},`${EX[tgtEdit].emoji} ${EX[tgtEdit].label} 목표 올리기`),
        h('div',{style:{fontSize:13,color:'#999',marginBottom:14}},'현재: ', h('b',{style:{color:'#667eea'}},`${targets[tgtEdit]}${EX[tgtEdit].unit}`)),
        h('input',{type:'number',autoFocus:true,value:tgtInput,onChange:e=>setTgtInput(e.target.value),
          onKeyDown:e=>e.key==='Enter'&&confirmTgt(),
          style:{width:'100%',padding:'12px 14px',borderRadius:10,border:`1.5px solid ${parseFloat(tgtInput)>targets[tgtEdit]?'#667eea':'#ddd'}`,fontSize:16,outline:'none'},
          placeholder:`${targets[tgtEdit]}${EX[tgtEdit].unit} 초과 값`}),
        tgtInput && !(parseFloat(tgtInput)>targets[tgtEdit]) && h('div',{style:{fontSize:12,color:'#f44336',marginTop:4}},'현재보다 높아야 해요'),
        h('div',{style:{display:'flex',gap:8,marginTop:12}},
          h('button',{onClick:()=>setTgtEdit(null),style:{flex:1,padding:'11px 0',borderRadius:10,border:'1.5px solid #eee',background:'white',fontSize:14,cursor:'pointer',color:'#999'}},'취소'),
          h('button',{onClick:confirmTgt,disabled:!(parseFloat(tgtInput)>targets[tgtEdit]),style:{flex:2,padding:'11px 0',borderRadius:10,border:'none',background:parseFloat(tgtInput)>targets[tgtEdit]?'linear-gradient(135deg,#667eea,#764ba2)':'#eee',color:parseFloat(tgtInput)>targets[tgtEdit]?'white':'#bbb',fontWeight:700,fontSize:14,cursor:'pointer'}},
            `확인${parseFloat(tgtInput)>targets[tgtEdit]?' → '+tgtInput+EX[tgtEdit].unit:''}`
          )
        )
      )
    ),

    // Header
    h('div', {style:{background:'linear-gradient(135deg,#667eea 0%,#764ba2 100%)',padding:'52px 20px 24px',color:'white'}},
      h('div',{style:{fontSize:13,opacity:0.8,marginBottom:8}},'💪 다이어트 트래커'),
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-end'}},
        h('div',null,
          h('div',{style:{fontSize:40,fontWeight:800,lineHeight:1}}, latestW??86, h('span',{style:{fontSize:20,fontWeight:600}},'kg')),
          h('div',{style:{fontSize:13,opacity:0.8,marginTop:4}},'현재 몸무게')
        ),
        h('div',{style:{textAlign:'right'}},
          h('div',{style:{fontSize:30,fontWeight:800,lineHeight:1,color:parseFloat(lost)>0?'#a8edbc':'rgba(255,255,255,0.6)'}}, parseFloat(lost)>0?`-${lost}`:'0', h('span',{style:{fontSize:16}},'kg')),
          h('div',{style:{fontSize:13,opacity:0.8,marginTop:4}},`시작(${startW}kg) 대비`)
        )
      )
    ),

    // Tabs
    h('div',{style:{display:'flex',background:'white',borderBottom:'2px solid #eee',position:'sticky',top:0,zIndex:10}},
      ...['today','history'].map(key=>h('button',{key,onClick:()=>setTab(key),style:{flex:1,padding:'14px 0',border:'none',background:'none',cursor:'pointer',fontWeight:tab===key?700:400,color:tab===key?'#667eea':'#999',borderBottom:tab===key?'2px solid #667eea':'2px solid transparent',marginBottom:-2,fontSize:15}},key==='today'?'오늘':'기록'))
    ),

    h('div',{style:{padding:16}},

      // ── 오늘 탭 ──
      tab==='today' && h('div',null,
        h('div',{style:{background:'white',borderRadius:16,padding:16,marginBottom:16,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}},
          h('div',{style:{fontSize:14,fontWeight:600,marginBottom:10,color:'#444'}},'⚖️ 오늘 몸무게'),
          h('div',{style:{display:'flex',gap:8}},
            h('input',{type:'number',step:0.1,min:30,max:200,inputMode:'decimal',
              placeholder:todWeight?`오늘: ${todWeight.weight}kg`:'몸무게 입력 (kg)',
              value:wInput,onChange:e=>setWInput(e.target.value),
              onKeyDown:e=>e.key==='Enter'&&submitW(),
              style:{flex:1,padding:'11px 14px',borderRadius:10,border:'1.5px solid #e0e0e0',fontSize:16,outline:'none'}}),
            h('button',{onClick:submitW,style:{padding:'11px 20px',borderRadius:10,border:'none',background:'linear-gradient(135deg,#667eea,#764ba2)',color:'white',fontWeight:700,cursor:'pointer',fontSize:15}},'기록')
          ),
          todWeight && h('div',{style:{fontSize:12,color:'#4caf50',marginTop:6}},`✅ 오늘 ${todWeight.weight}kg — 자동저장됨`)
        ),

        h('div',{style:{background:'white',borderRadius:16,padding:16,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
            h('div',{style:{fontSize:14,fontWeight:600,color:'#444'}},'🏃 오늘의 운동'),
            h('div',{style:{fontSize:13,color:done_count===IDS.length?'#4caf50':'#999',fontWeight:600}},`${done_count}/${IDS.length} ${done_count===IDS.length?'🎉 완료!':''}`)
          ),
          ...IDS.map(id => {
            const target=targets[id], done=getDone(id);
            const pct=Math.min(100,(done/target)*100), completed=done>=target;
            const entries=todLogs[id]||[];
            return h('div',{key:id,style:{marginBottom:22}},
              h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:6}},
                h('span',{style:{fontSize:22}},EX[id].emoji),
                h('span',{style:{fontWeight:700,fontSize:15,color:completed?'#4caf50':'#222',flex:1}},`${EX[id].label}${completed?' ✅':''}`),
                h('button',{onClick:()=>{setTgtEdit(id);setTgtInput('');},style:{padding:'4px 10px',borderRadius:6,border:'1.5px solid #e8e8e8',background:'white',color:'#aaa',fontSize:12,cursor:'pointer'}},'목표 ↑')
              ),
              h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:7}},
                h('div',{style:{flex:1,background:'#f0f0f0',borderRadius:99,height:10,overflow:'hidden'}},
                  h('div',{style:{background:completed?'linear-gradient(90deg,#43e97b,#38f9d7)':'linear-gradient(90deg,#667eea,#764ba2)',borderRadius:99,height:'100%',width:`${pct}%`,transition:'width 0.35s'}})
                ),
                h('span',{style:{fontSize:13,fontWeight:700,color:completed?'#4caf50':'#667eea',minWidth:64,textAlign:'right'}},`${done}/${target}${EX[id].unit}`)
              ),
              entries.length>0 && h('div',{style:{display:'flex',flexWrap:'wrap',gap:5,marginBottom:7}},
                ...entries.map((e,i)=>h('span',{key:i,style:{background:'#ede7f6',color:'#5c35b5',borderRadius:20,padding:'4px 11px',fontSize:12,fontWeight:600}},
                  `+${e.amount}`, h('span',{style:{color:'#b39ddb',fontWeight:400,fontSize:11}},` ${e.time}`)
                ))
              ),
              h('button',{onClick:()=>{setLogModal(id);setLogInput('');},style:{width:'100%',padding:'10px 0',borderRadius:10,border:completed?'1.5px solid #c8f0d4':'1.5px dashed #c5cae9',background:completed?'#f0fdf4':'#f5f6ff',color:completed?'#43a047':'#667eea',fontWeight:600,fontSize:13,cursor:'pointer'}},
                completed?'✓ 완료 · 더 추가하기':'+ 기록 추가'
              )
            );
          })
        )
      ),

      // ── 기록 탭 ──
      tab==='history' && h('div',null,

        // 몸무게 차트
        h('div',{style:{background:'white',borderRadius:16,padding:16,marginBottom:16,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}},
          h('div',{style:{fontSize:14,fontWeight:600,color:'#444',marginBottom:14}},'📉 몸무게 변화'),
          cw.length<2
            ?h('div',{style:{textAlign:'center',color:'#ccc',padding:'32px 0',fontSize:13}},'몸무게를 2일 이상 기록하면 그래프가 나타나요')
            :h('svg',{viewBox:`-14 -14 ${CW+28} ${CH+36}`,width:'100%',style:{overflow:'visible'}},
              h('defs',null,h('linearGradient',{id:'g',x1:'0',y1:'0',x2:'1',y2:'0'},h('stop',{offset:'0%',stopColor:'#667eea'}),h('stop',{offset:'100%',stopColor:'#764ba2'}))),
              h('polyline',{fill:'none',stroke:'url(#g)',strokeWidth:3,strokeLinejoin:'round',strokeLinecap:'round',points:pts}),
              ...cw.map((w,i)=>h('g',{key:i},
                h('circle',{cx:toX(i),cy:toY(w.weight),r:5,fill:'#764ba2',stroke:'white',strokeWidth:2}),
                h('text',{x:toX(i),y:toY(w.weight)-10,textAnchor:'middle',fontSize:10,fill:'#555',fontWeight:600},w.weight),
                (i===0||i===cw.length-1||cw.length<=7)&&h('text',{x:toX(i),y:CH+22,textAnchor:'middle',fontSize:9,fill:'#bbb'},fmtDate(w.date))
              ))
            )
        ),

        // 운동 통계
        h('div',{style:{background:'white',borderRadius:16,padding:16,marginBottom:16,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}},
          h('div',{style:{fontSize:14,fontWeight:600,color:'#444',marginBottom:4}},'🏅 운동 통계'),
          h('div',{style:{fontSize:12,color:'#bbb',marginBottom:14}},'최근 기록 기준'),
          exStatDates.length===0
            ? h('div',{style:{textAlign:'center',color:'#ccc',padding:'24px 0',fontSize:13}},'운동 기록이 없어요')
            : IDS.map(id => {
                const ex = EX[id];
                // 날짜별 합산
                const dayTotals = exStatDates.map(date => {
                  const dayLogs = data.logs[date] || {};
                  return { date, total: getDone(id, dayLogs) };
                }).filter(d=>d.total>0);

                if (dayTotals.length===0) return h('div',{key:id,style:{paddingBottom:14,marginBottom:14,borderBottom:'1px solid #f5f5f5'}},
                  h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
                    h('span',{style:{fontSize:18}},ex.emoji),
                    h('span',{style:{fontSize:14,fontWeight:600,color:'#ccc'}},'기록 없음')
                  )
                );

                const totalAmt = dayTotals.reduce((s,d)=>s+d.total,0);
                const avgAmt = (totalAmt/dayTotals.length).toFixed(1);
                const maxAmt = Math.max(...dayTotals.map(d=>d.total));
                const completeDays = dayTotals.filter(d=>d.total>=targets[id]).length;

                // mini bar chart (last 7 days with data)
                const barDays = dayTotals.slice(-7);
                const barMax = Math.max(...barDays.map(d=>d.total), targets[id]);

                return h('div',{key:id,style:{paddingBottom:18,marginBottom:18,borderBottom:'1px solid #f5f5f5'}},
                  h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:10}},
                    h('span',{style:{fontSize:20}},ex.emoji),
                    h('div',{style:{flex:1}},
                      h('div',{style:{fontSize:14,fontWeight:700,color:'#333'}},ex.label),
                      h('div',{style:{fontSize:11,color:'#aaa'}},`${dayTotals.length}일 기록`)
                    ),
                    h('div',{style:{textAlign:'right'}},
                      h('div',{style:{fontSize:16,fontWeight:800,color:'#667eea'}},`${totalAmt}${ex.unit}`),
                      h('div',{style:{fontSize:11,color:'#aaa'}},'누적')
                    )
                  ),
                  // 통계 숫자
                  h('div',{style:{display:'flex',gap:8,marginBottom:12}},
                    ...[
                      {label:'일평균', val:`${avgAmt}${ex.unit}`},
                      {label:'최고', val:`${maxAmt}${ex.unit}`},
                      {label:'목표달성', val:`${completeDays}일`},
                    ].map(({label,val})=>h('div',{key:label,style:{flex:1,background:'#f8f9fa',borderRadius:10,padding:'8px 0',textAlign:'center'}},
                      h('div',{style:{fontSize:14,fontWeight:700,color:'#444'}},val),
                      h('div',{style:{fontSize:10,color:'#bbb',marginTop:2}},label)
                    ))
                  ),
                  // 미니 바 차트
                  barDays.length>0 && h('div',{style:{display:'flex',alignItems:'flex-end',gap:4,height:48}},
                    ...barDays.map((d,i)=>{
                      const completed = d.total>=targets[id];
                      const barH = Math.max(4, (d.total/barMax)*44);
                      return h('div',{key:i,style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}},
                        h('div',{style:{width:'100%',height:barH,borderRadius:4,background:completed?'linear-gradient(180deg,#43e97b,#38f9d7)':'linear-gradient(180deg,#667eea,#764ba2)',transition:'height 0.3s'}}),
                        h('div',{style:{fontSize:9,color:'#ccc',whiteSpace:'nowrap'}},fmtDate(d.date))
                      );
                    })
                  )
                );
              })
        ),

        // 몸무게 목록
        h('div',{style:{background:'white',borderRadius:16,padding:16,marginBottom:16,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}},
          h('div',{style:{fontSize:14,fontWeight:600,color:'#444',marginBottom:12}},'📋 몸무게 기록'),
          data.weights.length===0
            ?h('div',{style:{textAlign:'center',color:'#ccc',padding:'24px 0',fontSize:13}},'아직 기록이 없어요')
            :h('div',null,...[...data.weights].reverse().map((w,i)=>{
              const prev=data.weights[data.weights.length-1-i-1];
              const diff=prev?(w.weight-prev.weight).toFixed(1):null;
              return h('div',{key:w.date,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'11px 0',borderBottom:'1px solid #f5f5f5'}},
                h('div',{style:{color:'#888',fontSize:14}},w.date.slice(5).replace('-','/')),
                h('div',{style:{display:'flex',alignItems:'center',gap:10}},
                  diff!==null&&h('span',{style:{fontSize:12,color:parseFloat(diff)<0?'#4caf50':parseFloat(diff)>0?'#f44336':'#ccc',fontWeight:600}},parseFloat(diff)>0?`+${diff}`:diff,'kg'),
                  h('span',{style:{fontWeight:700,fontSize:17,color:'#222'}},w.weight,'kg')
                )
              );
            }))
        ),

        // 목표 변경 로그
        data.targetLog?.length>0 && h('div',{style:{background:'white',borderRadius:16,padding:16,boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}},
          h('div',{style:{fontSize:14,fontWeight:600,color:'#444',marginBottom:12}},'📈 운동 목표 변경'),
          ...[...data.targetLog].reverse().map((log,i)=>h('div',{key:i,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid #f5f5f5'}},
            h('div',{style:{display:'flex',alignItems:'center',gap:8}},
              h('span',{style:{fontSize:18}},EX[log.id].emoji),
              h('div',null,h('div',{style:{fontSize:14,fontWeight:600,color:'#333'}},EX[log.id].label),h('div',{style:{fontSize:11,color:'#bbb'}},log.date.slice(5).replace('-','/')))
            ),
            h('div',{style:{fontSize:13}},
              h('span',{style:{color:'#bbb'}},`${log.from}${EX[log.id].unit}`),
              h('span',{style:{margin:'0 6px',color:'#ddd'}},'→'),
              h('span',{style:{color:'#4caf50',fontWeight:700}},`${log.to}${EX[log.id].unit}`)
            )
          ))
        )
      )
    )
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
